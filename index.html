<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voula Alpha - $5 to $100 Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }

        /* Fullscreen Video Background Container */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: #000;
        }

        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 1; 
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2); 
            z-index: 1;
        }

        /* Stats Panel Container */
        .stats-wrapper {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center; 
            gap: 8px;
        }

        .time-frame-label {
            font-size: 0.85rem;
            color: #FFFFFF; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .stats-panel {
            display: flex;
            gap: 40px;
            color: white;
            justify-content: center;
        }

        /* Half-Moon Pricing Badge as Link */
        .pricing-badge {
            position: fixed;
            bottom: 0; 
            left: 50%;
            transform: translateX(-50%);
            background-color: #CCAEE2; 
            color: white;
            padding: 30px 80px 20px 80px; 
            border-radius: 200px 200px 0 0; 
            font-weight: 700;
            font-size: 1.8rem; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            z-index: 60;
            letter-spacing: 1px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-decoration: none; 
        }

        .pricing-badge:hover {
            padding-bottom: 30px; 
            background-color: #b999d4;
        }

        /* Disclaimer Panel */
        .disclaimer-panel {
            position: fixed;
            bottom: 40px;
            left: 40px;
            z-index: 50;
            color: white;
            max-width: 280px; 
        }

        .item-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            padding-left: 20px;
        }

        .item-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10%;
            height: 80%;
            width: 2px;
            background-color: white;
        }

        .label-text {
            font-size: 0.75rem; 
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .value-text {
            font-size: 2.2rem; 
            font-weight: 700;
            line-height: 1;
        }

        .disclaimer-text {
            font-size: 0.75rem; 
            line-height: 1.5;
            opacity: 0.7;
            font-weight: 400;
        }

        /* Speech Bubble Style - Updated for left tail and circles */
        .bubble-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .speech-bubble {
            position: relative;
            background: #ffffff;
            color: #000000;
            border-radius: 1.5rem;
            padding: 1.2rem 2rem;
            font-size: 1.2rem; 
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            max-width: 480px;
            text-align: left;
            z-index: 10;
            white-space: pre-line;
        }

        /* Main tail on the left */
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 30px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Small circles for thought/speech effect */
        .bubble-circle-1 {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            margin-left: 22px;
            margin-top: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .bubble-circle-2 {
            width: 7px;
            height: 7px;
            background: white;
            border-radius: 50%;
            margin-left: 14px;
            margin-top: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .bubble-wrapper.mini .speech-bubble {
            font-size: 1rem;
            padding: 0.6rem 1.2rem;
            background: #f8f9fa;
            border: 1px solid #CCAEE2;
        }

        .bubble-wrapper.cta .speech-bubble {
            background: #CCAEE2;
            color: white;
        }
        
        .bubble-wrapper.cta .speech-bubble::after,
        .bubble-wrapper.cta .bubble-circle-1,
        .bubble-wrapper.cta .bubble-circle-2 {
            background: #CCAEE2;
        }

        .bubble-wrapper.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .bubble-wrapper.exit {
            opacity: 0;
            transform: scale(0.9) translateY(-20px);
            pointer-events: none;
        }

        .content-overlay {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bubble-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding-bottom: 10%;
        }

        /* --- Mobile Responsive Fixes --- */
        @media (max-width: 768px) {
            .pricing-badge {
                font-size: 1.2rem;
                padding: 20px 40px 15px 40px;
                border-radius: 100px 100px 0 0;
            }

            .stats-wrapper {
                bottom: auto;
                top: 25px; 
                right: 0;
                left: 0;
                width: 100%;
                align-items: center; 
            }

            .speech-bubble {
                font-size: 1.1rem;
                padding: 1rem 1.4rem;
                max-width: 90%;
            }

            .bubble-grid {
                padding-bottom: 25%; 
            }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline preload="auto" class="video-bg" id="bgVideo">
            <source src="voulaalpha.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- Το κουμπί με το Action CTA στα 3$ -->
    <a href="https://selar.com/51555l6229" id="dynamic-pricing" class="pricing-badge" target="_blank">
        Join Challenge — 3-Day Access for $3
    </a>

    <div class="disclaimer-panel">
        <div class="item-container">
            <span class="label-text">Disclaimer</span>
            <p class="disclaimer-text">
                Past performance does not guarantee future results. 
                Trading involves significant risk. 
            </p>
        </div>
    </div>

    <div class="stats-wrapper">
        <div class="time-frame-label">Community Results</div>
        <div class="stats-panel">
            <div class="item-container">
                <span class="label-text">Wins</span>
                <span class="value-text">209</span>
            </div>
            <div class="item-container">
                <span class="label-text">Losses</span>
                <span class="value-text">5</span>
            </div>
        </div>
    </div>

    <div class="content-overlay">
        <div id="bubble-container" class="bubble-grid"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const pricingElement = document.getElementById('dynamic-pricing');
            const bubbleContainer = document.getElementById('bubble-container');

            const messages = [
                { 
                    text: "Don’t Miss the Next Trade\nWhile you’re watching… others are already in.", 
                    type: "headline" 
                },
                { 
                    text: "Same trades. Same timing. Same opportunity.\nNo signals guessing. No confusion.", 
                    type: "normal" 
                },
                { 
                    text: "While you hesitate… others are already in profit.\nVoula Alpha traders follow the move BEFORE it happens.", 
                    type: "normal" 
                },
                { 
                    text: "The question is simple: are you in — or watching again?", 
                    type: "normal" 
                },
                { 
                    text: "WHAT YOU GET:\n✔ Real-time trade entries\n✔ Stop loss & take profit\n✔ Same trades for all members\n✔ Private Telegram access", 
                    type: "mini" 
                },
                { 
                    text: "⚠️ RULE\nOnly 50 traders per cycle.\nOnce full — access closes.\nIf you miss this cycle, you wait for the next one.", 
                    type: "headline" 
                },
                { 
                    text: "“This is not signals. This is execution.”", 
                    type: "mini" 
                },
                { 
                    text: "Join Challenge Now", 
                    type: "cta" 
                }
            ];

            let currentIndex = 0;

            const updatePricing = () => {
                const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                let priceText = "Join Challenge — 3-Day Access for $3";

                if (timeZone.includes('Africa/Lagos')) {
                    priceText = "Join Challenge — 3-Day Access for 3,000 NGN";
                } else if (timeZone.includes('Asia/Tokyo')) {
                    priceText = "Join Challenge — 3-Day Access for 450 JPY";
                } else if (timeZone.includes('Asia/Dubai')) {
                    priceText = "Join Challenge — 3-Day Access for 11 AED";
                }

                pricingElement.textContent = priceText;
            };
            updatePricing();

            function showNextMessage() {
                if (currentIndex >= messages.length) return;

                const msg = messages[currentIndex];
                
                const wrapper = document.createElement('div');
                wrapper.className = 'bubble-wrapper';
                if (msg.type === 'mini') wrapper.classList.add('mini');
                if (msg.type === 'cta') wrapper.classList.add('cta');

                const bubble = document.createElement('div');
                bubble.className = 'speech-bubble';
                if (msg.type === 'headline') {
                    bubble.style.border = '2px solid #CCAEE2';
                    bubble.style.backgroundColor = '#fdfaff';
                }
                bubble.textContent = msg.text;
                
                wrapper.appendChild(bubble);
                
                const c1 = document.createElement('div');
                c1.className = 'bubble-circle-1';
                wrapper.appendChild(c1);

                const c2 = document.createElement('div');
                c2.className = 'bubble-circle-2';
                wrapper.appendChild(c2);

                bubbleContainer.appendChild(wrapper);

                requestAnimationFrame(() => {
                    wrapper.classList.add('show');
                });

                // Αυξάνουμε λίγο τη διάρκεια για τα συννεφάκια με περισσότερο κείμενο
                const displayDuration = msg.text.length > 50 ? 3500 : 2800; 

                setTimeout(() => {
                    if (currentIndex < messages.length - 1) {
                        wrapper.classList.add('exit');
                        setTimeout(() => {
                            wrapper.remove();
                            currentIndex++;
                            showNextMessage();
                        }, 500);
                    }
                }, displayDuration);
            }

            showNextMessage();
        });
    </script>
</body>
</html>
