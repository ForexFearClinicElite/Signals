<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verified Trading Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }

        /* Fullscreen Video Background Container */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: #0a0a0a;
        }

        /* Iframe styling to cover the screen like background-size: cover */
        .video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
        }

        /* Fix for different aspect ratios to ensure no black bars */
        @media (min-aspect-ratio: 16/9) {
            .video-container iframe { height: 56.25vw; }
        }
        @media (max-aspect-ratio: 16/9) {
            .video-container iframe { width: 177.78vh; }
        }

        .video-container iframe.loaded {
            opacity: 1;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.15); /* Ελαφρύ σκοτείνιασμα για να διαβάζονται τα κείμενα */
            z-index: 1;
        }

        /* Stats Panel */
        .stats-panel {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 40px;
            z-index: 50;
            color: white;
        }

        /* Half-Moon Pricing Badge */
        .pricing-badge {
            position: fixed;
            bottom: 0; 
            left: 50%;
            transform: translateX(-50%);
            background-color: #CCAEE2; 
            color: white;
            padding: 30px 80px 20px 80px; 
            border-radius: 200px 200px 0 0; 
            font-weight: 700;
            font-size: 1.8rem; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            z-index: 60;
            letter-spacing: 1px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        /* Disclaimer Panel */
        .disclaimer-panel {
            position: fixed;
            bottom: 40px;
            left: 40px;
            z-index: 50;
            color: white;
            max-width: 280px; 
        }

        .item-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            padding-left: 20px;
        }

        .item-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10%;
            height: 80%;
            width: 2px;
            background-color: white;
        }

        .label-text {
            font-size: 0.75rem; 
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .value-text {
            font-size: 2.2rem; 
            font-weight: 700;
            line-height: 1;
        }

        .disclaimer-text {
            font-size: 0.75rem; 
            line-height: 1.5;
            opacity: 0.7;
            font-weight: 400;
        }

        /* Speech Bubble Style */
        .speech-bubble {
            position: relative;
            background: #ffffff;
            color: #000000;
            border-radius: 1.2rem;
            padding: 0.8rem 1.5rem;
            font-size: 1.2rem; 
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            max-width: fit-content;
            transform-origin: 20% 100%; 
            opacity: 0;
            transform: scale(0) translateY(30px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 25px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 12px solid #ffffff;
        }

        .speech-bubble.cta {
            background: #CCAEE2;
            color: white;
        }
        
        .speech-bubble.cta::after {
            border-top-color: #CCAEE2;
        }

        .speech-bubble.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .content-overlay {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bubble-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding-bottom: 15%; 
            align-items: flex-start;
        }

        /* --- Mobile Responsive Fixes --- */
        @media (max-width: 768px) {
            .pricing-badge {
                font-size: 1.2rem;
                padding: 20px 40px 15px 40px;
                border-radius: 100px 100px 0 0;
            }

            .stats-panel {
                bottom: auto;
                top: 20px; 
                right: 20px;
                left: 20px;
                justify-content: space-between;
                gap: 10px;
            }

            .disclaimer-panel {
                bottom: 80px; 
                left: 20px;
                right: 20px;
                max-width: none;
            }

            .value-text {
                font-size: 1.5rem;
            }

            .label-text {
                font-size: 0.6rem;
                letter-spacing: 1px;
            }

            .speech-bubble {
                font-size: 0.95rem;
                padding: 0.6rem 1rem;
            }

            .bubble-grid {
                padding-bottom: 40%; 
                width: 90%;
            }
            
            .item-container {
                padding-left: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Video Background Container -->
    <div class="video-container">
        <div id="player"></div>
        <div class="video-overlay"></div>
    </div>

    <!-- Half-Moon Pricing Badge -->
    <div id="dynamic-pricing" class="pricing-badge">
        6€ One Day Access
    </div>

    <!-- Disclaimer Panel -->
    <div class="disclaimer-panel">
        <div class="item-container">
            <span class="label-text">Disclaimer</span>
            <p class="disclaimer-text">
                Past performance does not guarantee future results. 
                Trading involves significant risk of loss. 
                Invest responsibly.
            </p>
        </div>
    </div>

    <!-- Stats Panel -->
    <div class="stats-panel">
        <div class="item-container">
            <span class="label-text">Wins</span>
            <span class="value-text">209</span>
        </div>
        <div class="item-container">
            <span class="label-text">Losses</span>
            <span class="value-text">5</span>
        </div>
        <div class="item-container">
            <span class="label-text">Drawdown</span>
            <span class="value-text">7%</span>
        </div>
    </div>

    <!-- Main Viewport for Speech Bubbles -->
    <div class="content-overlay">
        <div id="bubble-container" class="bubble-grid">
            <!-- Dynamic Bubbles will appear here -->
        </div>
    </div>

    <!-- YouTube Iframe API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        const videoId = 'J5PqYHEkmzw'; // Updated with your provided YouTube ID

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'showinfo': 0,
                    'rel': 0,
                    'loop': 1,
                    'playlist': videoId,
                    'mute': 1,
                    'modestbranding': 1,
                    'playsinline': 1,
                    'enablejsapi': 1,
                    'iv_load_policy': 3,
                    'start': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
            // Show video once it's actually playing to avoid black flicker
            setTimeout(() => {
                document.querySelector('#player').classList.add('loaded');
            }, 500);
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                player.playVideo();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('bubble-container');
            const pricingElement = document.getElementById('dynamic-pricing');

            // --- Dynamic Pricing Strategy ---
            const updatePricing = () => {
                const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                
                if (timeZone.includes('Asia/Tokyo')) {
                    pricingElement.textContent = "¥1000 One Day Access";
                } else if (timeZone.includes('Asia/Dubai')) {
                    pricingElement.textContent = "25 AED One Day Access";
                } else if (timeZone.includes('Africa/Lagos')) {
                    pricingElement.textContent = "₦10,500 One Day Access";
                } else if (timeZone.includes('Africa/Johannesburg')) {
                    pricingElement.textContent = "R120 One Day Access";
                } else if (timeZone.includes('America/Toronto') || timeZone.includes('America/Vancouver')) {
                    pricingElement.textContent = "$9 CAD One Day Access";
                } else {
                    pricingElement.textContent = "6€ One Day Access";
                }
            };
            updatePricing();

            const messages = [
                { text: "While you hesitate… others are already in winning trades.", type: "normal" },
                { text: "Voula Alpha members get signals BEFORE the move.", type: "normal" },
                { text: "Question is: are you in — or watching again?", type: "normal" },
                { text: "Don’t Miss the Next Trade", type: "headline" },
                { text: "Join Now", type: "cta" }
            ];

            let initialDelay = 2000; // Delay to let the video load a bit
            let intervalBetween = 1800;

            messages.forEach((msg, index) => {
                setTimeout(() => {
                    const bubble = document.createElement('div');
                    bubble.className = 'speech-bubble';
                    
                    if (msg.type === 'headline') {
                        bubble.style.fontSize = '1.4rem';
                        bubble.style.border = '2px solid #CCAEE2';
                    }
                    
                    if (msg.type === 'cta') {
                        bubble.classList.add('cta');
                        bubble.style.fontSize = '1.6rem';
                    }
                    
                    bubble.textContent = msg.text;
                    container.appendChild(bubble);

                    requestAnimationFrame(() => {
                        bubble.classList.add('show');
                    });
                }, initialDelay + (index * intervalBetween));
            });
        });
    </script>
</body>
</html>
