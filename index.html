<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pythagorean Wealth Institute | Luxury Quantitative Trading</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #C5A059; 
        }

        /* ✅ CLEAN BODY */
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: black;
            color: white;
            margin: 0;
        }

        /* ✅ FULL IMAGE BACKGROUND (NO CROP) */
        .bg-image {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            width: 100%;
            height: 100%;

            object-fit: contain; /* ΔΕΙΧΝΕΙ ΟΛΟ ΤΟ ΚΤΙΡΙΟ */

            z-index: -1;
        }

        .font-cinzel { font-family: 'Cinzel', serif; }

        .glass-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
        }

        .video-card {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
        }

        .gold-text {
            background: linear-gradient(135deg, #A67C00 0%, #C5A059 50%, #A67C00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gold {
            background: var(--gold);
            color: black;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 700;
        }

        .hero-section {
            padding-top: 20vh;
            padding-bottom: 15vh;
        }
    </style>
</head>

<body>

    <!-- ✅ BACKGROUND IMAGE -->
    <img src="pythagoras_building.jpg" class="bg-image">

    <header class="hero-section text-center">
        <h1 class="font-cinzel text-5xl md:text-7xl gold-text uppercase">Pythagorean</h1>
        <h2 class="font-cinzel text-2xl md:text-4xl uppercase">Wealth Institute</h2>
    </header>

    <main class="max-w-6xl mx-auto px-6 space-y-20 pb-32">

        <section class="video-card p-6 text-center">
            <video controls autoplay muted loop class="w-full max-w-2xl mx-auto">
                <source src="trading_proof.mp4" type="video/mp4">
            </video>
        </section>

        <section class="grid md:grid-cols-3 gap-8">
            <div class="glass-card p-6 text-center">
                <h3 class="font-cinzel">Elite Signals</h3>
                <p class="gold-text text-3xl">$180/week</p>
            </div>

            <div class="glass-card p-6 text-center">
                <h3 class="font-cinzel">Luxury Seminar</h3>
                <p class="gold-text text-3xl">$9,000</p>
            </div>

            <div class="glass-card p-6 text-center">
                <h3 class="font-cinzel">Algorithm IP</h3>
                <p class="gold-text text-3xl">$9,000,000</p>
            </div>
        </section>

    </main>

</body>
</html>
