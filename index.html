<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pythagorean Wealth Institute</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root { --gold: #C5A059; }

body {
    font-family: 'Montserrat', sans-serif;
    background-color: #000;
    color: white;
    margin: 0;
}

.font-cinzel { font-family: 'Cinzel', serif; }

.glass-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
}

.video-card {
    background: rgba(0,0,0,0.25);
    border-radius: 20px;
}

.gold-text {
    background: linear-gradient(135deg,#A67C00,#C5A059,#A67C00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.btn-gold {
    background: var(--gold);
    color: black;
    padding: 0.8rem 2rem;
    border-radius: 50px;
    font-weight: bold;
}

video {
    filter: contrast(1.1) brightness(1.05);
}
</style>
</head>

<body>

<!-- HERO -->
<header class="relative w-full h-screen flex items-center justify-center text-center overflow-hidden">

    <img src="pythagoras_building.jpg"
         id="heroImage"
         class="absolute w-full h-full object-contain top-0 left-0 z-0 will-change-transform">

    <div class="absolute inset-0 bg-black/40 z-10"></div>

    <div class="relative z-20 px-4">
        <h1 class="font-cinzel text-5xl md:text-7xl tracking-[0.3em] gold-text uppercase font-bold mb-4">
            Pythagorean
        </h1>

        <h2 class="font-cinzel text-2xl md:text-4xl text-white tracking-[0.2em] uppercase opacity-90">
            Wealth Institute
        </h2>

        <div class="h-1 w-24 bg-[#C5A059] mt-6 mx-auto"></div>
    </div>

</header>

<main class="max-w-6xl mx-auto px-6 space-y-24 pb-32">

<!-- VIDEO -->
<section class="video-card p-6 md:p-10 text-center">
    <h3 class="font-cinzel text-2xl mb-8 uppercase gold-text">Live Trade Verification</h3>

    <div class="rounded-xl overflow-hidden border border-white/10 max-w-md mx-auto shadow-2xl bg-black/70">
        <video controls autoplay muted loop playsinline class="w-full rounded-xl">
            <source src="trading_proof.mp4" type="video/mp4">
        </video>
    </div>
</section>

<!-- PRICING -->
<section class="grid md:grid-cols-3 gap-8">

<div class="glass-card p-8 text-center">
    <h3 class="font-cinzel text-xl mb-4 uppercase">Elite Signals</h3>
    <div class="text-4xl gold-text mb-6">$180</div>
    <a href="#" class="btn-gold">Subscribe</a>
</div>

<div class="glass-card p-8 text-center">
    <h3 class="font-cinzel text-xl mb-4 uppercase">Seminar</h3>
    <div class="text-4xl gold-text mb-6">$9000</div>
    <a href="#" class="btn-gold">Book</a>
</div>

<div class="glass-card p-8 text-center">
    <h3 class="font-cinzel text-xl mb-4 uppercase">Algorithm</h3>
    <div class="text-4xl gold-text mb-6">$9M</div>
    <a href="#" class="btn-gold">Contact</a>
</div>

</section>

</main>

<footer class="text-center py-10 border-t border-white/10">
    <p class="text-xs text-gray-400">Trading involves risk.</p>
</footer>

<!-- PARALLAX SCRIPT -->
<script>
const heroImage = document.getElementById("heroImage");

window.addEventListener("scroll", () => {
    let offset = window.scrollY;
    heroImage.style.transform = `translateY(${offset * -0.25}px)`;
});
</script>

</body>
</html>
